<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- En-tête -->
    <header class="page-header">
      <h1>📝 Advanced To-Do List</h1>
      <div class="welcome-banner">✅ Welcome to your advanced to-do list&nbsp;!</div>
      <button id="create-btn" class="create-link">✏️ Create a new task</button>
    </header>

    <!-- Barre des vues -->
    <div class="toolbar">
      <div class="views">
        <button class="view-tab active" data-view="status">▦ Status</button>
        <button class="view-tab" data-view="calendar">📅 Calendar</button>
      </div>
      <span id="status-badge" class="badge">connecting…</span>
    </div>

    <div class="layout">
      <main class="content">
        <!-- Vue STATUS (Kanban) -->
        <section id="view-status" class="view">
          <div class="board">
            <section class="column" data-status="todo">
              <div class="col-head"><span class="pill pill-gray">Not started</span></div>
              <div class="cards" id="col-todo"></div>
            </section>
            <section class="column" data-status="doing">
              <div class="col-head"><span class="pill pill-blue">In progress</span></div>
              <div class="cards" id="col-doing"></div>
            </section>
            <section class="column" data-status="done">
              <div class="col-head"><span class="pill pill-green">Done</span></div>
              <div class="cards" id="col-done"></div>
            </section>
          </div>
        </section>

        <!-- Vue CALENDAR -->
        <section id="view-calendar" class="view hidden">
          <div class="cal-toolbar">
            <button id="cal-prev" class="cal-nav">‹</button>
            <span id="cal-title" class="cal-title"></span>
            <button id="cal-next" class="cal-nav">›</button>
            <button id="cal-today" class="cal-today">Today</button>
          </div>
          <div class="cal-weekdays">
            <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span>
            <span>Fri</span><span>Sat</span><span>Sun</span>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </section>
      </main>

      <!-- Panneau Completion -->
      <aside class="completion">
        <h3>📊 Completion</h3>
        <div class="completion-card">
          <div class="completion-head">Tasks</div>
          <div class="bar" data-period="today">
            <div class="bar-top"><span class="bar-label">Today</span><span class="bar-val">0%</span></div>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
          <div class="bar" data-period="week">
            <div class="bar-top"><span class="bar-label">Week</span><span class="bar-val">0%</span></div>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
          <div class="bar" data-period="month">
            <div class="bar-top"><span class="bar-label">Month</span><span class="bar-val">0%</span></div>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
          <div class="bar" data-period="year">
            <div class="bar-top"><span class="bar-label">Year</span><span class="bar-val">0%</span></div>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Modale création / édition -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modal-title">Create a new task</h2>
      <form id="task-form">
        <div class="field-row">
          <div class="field field-emoji">
            <label for="f-emoji">Emoji</label>
            <input id="f-emoji" type="text" maxlength="4" placeholder="📝" />
          </div>
          <div class="field field-title">
            <label for="f-title">Title</label>
            <input id="f-title" type="text" placeholder="What needs to be done?" required />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-status">Status</label>
            <select id="f-status">
              <option value="todo">Not started</option>
              <option value="doing">In progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="field">
            <label for="f-due">Due date</label>
            <input id="f-due" type="date" />
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-delete" class="btn btn-danger hidden">Delete</button>
          <span class="spacer"></span>
          <button type="button" id="modal-cancel" class="btn">Cancel</button>
          <button type="submit" id="modal-save" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
